<!DOCTYPE html>
<html>
<head>
  <title>Menu Driven Program</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    .menu { margin-bottom: 20px; }
    .output { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Menu Driven Program (DOM)</h2>
  
  <div class="menu">
    <button onclick="readText()">Read text from DOM</button>
    <button onclick="addNumbers()">Add two numbers from DOM</button>
    <button onclick="changeCSS()">Change CSS using DOM</button>
    <button onclick="exitProgram()">Exit</button>
  </div>

  <p id="text">hello my name is sankar</p>
  <input type="number" id="num1" placeholder="Enter first number">
  <input type="number" id="num2" placeholder="Enter second number">

  <div class="output" id="output"></div>

  <script>
    function readText() {
      let text = document.getElementById("text").innerText;
      document.getElementById("output").innerText = "Text: " + text;
    }

    function addNumbers() {
      let n1 = parseFloat(document.getElementById("num1").value);
      let n2 = parseFloat(document.getElementById("num2").value);
      let sum = n1 + n2;
      document.getElementById("output").innerText = "Sum: " + sum;
    }

    function changeCSS() {
      document.getElementById("text").style.color = "blue";
      document.getElementById("text").style.fontSize = "20px";
      document.getElementById("output").innerText = "CSS changed!";
    }

    function exitProgram() {
      document.body.innerHTML = "<h3>Program exited.</h3>";
    }
  </script>
</body>
</html>
