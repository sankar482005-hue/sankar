<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>jscode</title>
</head>
<body>
    <script>
       const option={
          add:function add()
          {
            
            function inner( a,b)
            {
              console.log("Addition of "+a+" and "+b)
              return a+b;
            }
            return inner;
          },
          
          sub:function Sub()
          {
            
            function inner( a,b)
            {
              console.log("subtraction of "+a+" and "+b)
              return a-b;
            }
            return inner;
          },

          multi:function multi()
          { 
            

            function inner( a,b)
            {
              console.log("multiplication of "+a+" and "+b)
              return a*b;
            }
            return inner;
          },
          
          
         
       }
       const kuttu = option.add();
       const kalli = option.sub();
       const peruku = option.multi();


      
       
       console.log(kuttu(10,20))
       console.log(kalli(10,20))
       console.log(peruku(10,20))


    </script>
</body>
